<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alcofa de Sabores</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F0E8;--cream2:#EDE8DC;--cream3:#E0D9CC;
  --g:#1D9E75;--gl:#d4f0e5;--gd:#0F6E56;
  --am:#BA7517;--al:#FAEEDA;
  --rd:#A32D2D;--rl:#FCEBEB;
  --txt:#1A1A18;--txt2:#6B6B67;--txt3:#A8A8A4;
  --border:#D8D3C8;--card:#FFFFFF;
  --radius:14px;--radius-sm:9px;
  font-family:'Sora',sans-serif;
}
body{background:var(--cream);color:var(--txt);min-height:100vh;font-size:15px}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--cream)}
.login-wrap{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:28px}
.login-logo img{width:200px;height:200px;object-fit:contain}
.login-sub{font-size:12px;color:var(--txt2);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-top:8px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;display:flex;flex-direction:column;gap:14px;box-shadow:0 2px 24px rgba(0,0,0,0.07)}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:0.8px}
.field input{padding:13px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Sora',sans-serif;background:var(--cream);color:var(--txt);transition:border-color 0.15s;-webkit-appearance:none}
.field input:focus{outline:none;border-color:var(--g);background:#fff}
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0px 1000px var(--cream) inset;-webkit-text-fill-color:var(--txt);border-color:var(--border)}
.btn-login{padding:14px;background:var(--rd);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer;transition:opacity 0.15s;letter-spacing:0.3px}
.btn-login:hover{opacity:0.88}
.login-err{color:var(--rd);font-size:13px;text-align:center;display:none;padding:8px;background:var(--rl);border-radius:var(--radius-sm)}

/* APP SHELL */
#app{display:none;flex-direction:column;min-height:100vh;background:var(--cream)}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo img{height:28px;width:28px;object-fit:contain;border-radius:50%}
.topbar-name{font-size:15px;font-weight:600;color:var(--txt);letter-spacing:-0.2px}
.role-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;font-family:'DM Mono',monospace}
.rb-admin{background:var(--txt);color:#fff}
.rb-worker{background:var(--al);color:var(--am)}
.btn-logout{font-size:13px;color:var(--txt2);background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;font-family:'Sora',sans-serif}
.btn-logout:hover{background:var(--cream)}

/* NAV */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ntab{flex:1;min-width:64px;padding:10px 6px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s}
.ntab.on{color:var(--rd);border-bottom-color:var(--rd)}
.ntab .ni{font-size:18px;display:block;margin-bottom:3px}

/* CONTENT */
.cnt{padding:16px;max-width:720px;margin:0 auto;width:100%}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* INPUTS */
input[type=text],input[type=password],input[type=date],input[type=email],input[type=number],select,textarea{
  padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;font-family:'Sora',sans-serif;background:var(--cream);color:var(--txt);
  transition:border-color 0.15s;width:100%;-webkit-appearance:none
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--g);background:#fff}

/* BUTTONS */
.btn{padding:10px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'Sora',sans-serif;transition:all 0.15s;white-space:nowrap}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:var(--gd)}
.btn-rd{background:var(--rd);color:#fff}.btn-rd:hover{opacity:0.85}
.btn-out{background:none;border:1px solid var(--border);color:var(--txt2)}.btn-out:hover{background:var(--cream)}
.btn-dark{background:var(--txt);color:#fff}.btn-dark:hover{opacity:0.85}
.btn-full{width:100%;padding:14px;font-size:15px;font-weight:600}
.irow{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.irow input,.irow select{width:auto;flex:1}

/* LIST */
.litem{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.litem:last-child{border-bottom:none}
.ltxt{flex:1;font-size:14px;color:var(--txt);line-height:1.4}
.lsub{font-size:12px;color:var(--txt2);margin-top:2px}
.bic{background:none;border:none;cursor:pointer;font-size:15px;padding:4px 6px;color:var(--txt3);border-radius:6px}
.bic:hover{color:var(--rd);background:var(--rl)}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s}
.chk.on{background:var(--g);border-color:var(--g);color:#fff}

/* TAGS */
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap;font-family:'DM Mono',monospace}
.tag-n{background:var(--al);color:var(--am)}
.tag-u{background:var(--rl);color:var(--rd)}
.tag-d{background:var(--gl);color:var(--gd)}
.tag-dark{background:var(--txt);color:#fff}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.snum{font-size:26px;font-weight:600;color:var(--txt);font-family:'DM Mono',monospace;letter-spacing:-1px}
.slbl{font-size:12px;color:var(--txt2);margin-top:3px}
.scard.accent{background:var(--rd);border-color:var(--rd)}
.scard.accent .snum,.scard.accent .slbl{color:#fff}

/* NOTICE */
.notice-banner{background:var(--rd);color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:14px}
.notice-banner .nb-from{font-size:11px;opacity:0.75;font-family:'DM Mono',monospace;margin-bottom:4px}
.notice-banner .nb-msg{font-size:15px;font-weight:500}

/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-hdr span{font-size:15px;font-weight:600}
.cal-hdr button{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;cursor:pointer;color:var(--txt);font-family:'Sora',sans-serif}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdlbl{text-align:center;font-size:10px;color:var(--txt2);padding:4px 0;font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
.cday{text-align:center;padding:8px 2px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--txt);transition:background 0.1s}
.cday:hover{background:var(--cream2)}
.cday.today{background:var(--rd);color:#fff;font-weight:600}
.cday.req{background:var(--al);color:var(--am)}
.cday.appr{background:var(--gl);color:var(--gd);font-weight:500}
.cday.om{color:var(--txt3)}
.cal-legend{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}
.cl-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* AZEITONA */
.cat-label{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 8px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.pcard{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;display:flex;flex-direction:column;gap:8px;transition:border-color 0.15s}
.pcard:hover{border-color:var(--g)}
.pcard.in-cart{border-color:var(--g);background:var(--gl)}
.pname{font-size:12px;font-weight:500;color:var(--txt);line-height:1.35}
.pcod{font-size:10px;color:var(--txt3);font-family:'DM Mono',monospace}
.pprice{font-size:11px;color:var(--txt2)}
.qrow{display:flex;align-items:center;gap:6px}
.qbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--txt);transition:all 0.15s;line-height:1}
.qbtn:hover{background:var(--g);color:#fff;border-color:var(--g)}
.qnum{font-size:14px;font-weight:600;min-width:20px;text-align:center;color:var(--txt);font-family:'DM Mono',monospace}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fchip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--txt2);font-family:'Sora',sans-serif;transition:all 0.15s}
.fchip.on{background:var(--txt);color:#fff;border-color:var(--txt)}
.osum{background:var(--gl);border:1px solid var(--g);border-radius:var(--radius);padding:14px;margin-top:14px}
.osum h4{font-size:13px;font-weight:600;color:var(--gd);margin-bottom:10px}
.oline{display:flex;justify-content:space-between;font-size:12px;color:var(--gd);padding:3px 0;font-family:'DM Mono',monospace}
.otot{font-weight:600;border-top:1px solid rgba(29,158,117,0.3);margin-top:6px;padding-top:6px;font-size:13px}

/* REQUEST */
.ritem{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
.ritem:last-child{border-bottom:none}
.btn-apr{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--g);color:#fff;font-family:'Sora',sans-serif}
.btn-dcl{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--rl);color:var(--rd);font-family:'Sora',sans-serif}

/* PAST ORDERS */
.past-order{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.po-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.po-date{font-size:13px;font-weight:600;color:var(--txt);font-family:'DM Mono',monospace}
.po-lines{font-size:12px;color:var(--txt2);line-height:1.7;margin-top:4px}

/* ADMIN */
.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.ua-admin{background:var(--txt);color:#fff}
.ua-worker{background:var(--al);color:var(--am)}
.prod-admin-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.prod-admin-row:last-child{border-bottom:none}
.prod-admin-row .pn{flex:1;color:var(--txt)}
.prod-admin-row .pc{font-family:'DM Mono',monospace;font-size:12px;color:var(--txt2);min-width:90px}
.setting-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-row label{font-size:13px;color:var(--txt);min-width:140px;flex-shrink:0}
.setting-row input{flex:1}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--txt)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1}
.modal .field{margin-bottom:10px}

/* FB BANNER */
.fb-banner{background:var(--al);border:1px solid #e0c070;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--am);display:flex;align-items:center;gap:8px}
.fb-banner.ok{background:var(--gl);border-color:var(--g);color:var(--gd)}

/* EMPTY */
.empty{text-align:center;padding:24px;color:var(--txt2);font-size:13px}

/* WORKER BIG INPUTS */
.big-input{padding:16px;font-size:17px;border-radius:var(--radius-sm);border:1.5px solid var(--border);width:100%;font-family:'Sora',sans-serif;background:var(--cream);color:var(--txt);margin-bottom:12px;-webkit-appearance:none}
.big-input:focus{outline:none;border-color:var(--g);background:#fff}
.btn-big{width:100%;padding:18px;border-radius:var(--radius-sm);font-size:17px;font-weight:600;cursor:pointer;border:none;font-family:'Sora',sans-serif;margin-bottom:10px}
.btn-big-g{background:var(--g);color:#fff}
.btn-big-rd{background:var(--rd);color:#fff}
</style>
</head>

<div id="app">
  <div id="fb-status" style="display:none;background:var(--al);color:var(--am);font-size:12px;padding:8px 16px;align-items:center;gap:8px;font-family:DM Mono,monospace"></div>

var listenersOn = false;
function startListeners() {
  if (listenersOn || !FB) return;
  listenersOn = true;
  console.log('Starting all listeners');

  // Shopping
  db.collection('shopping').onSnapshot(function(snap) {
    S.shopping = snap.docs.map(function(d) { var o = d.data(); o.id = d.id; return o; });
    console.log('shopping update:', S.shopping.length);
    var el = document.getElementById('sl');
    if (el) el.innerHTML = shopHTML();
    if (isActiveTab('dash')) renderDash(document.getElementById('cnt'));
  }, function(e) { console.error('shopping listener:', e.message); });

  // Tasks
  db.collection('tasks').onSnapshot(function(snap) {
    S.tasks = snap.docs.map(function(d) { var o = d.data(); o.id = d.id; return o; });
    console.log('tasks update:', S.tasks.length);
    var el = document.getElementById('tl');
    if (el) el.innerHTML = taskHTML();
    if (isActiveTab('dash')) renderDash(document.getElementById('cnt'));
  }, function(e) { console.error('tasks listener:', e.message); });

  // Orders
  db.collection('orders').onSnapshot(function(snap) {
    S.orders = snap.docs.map(function(d) { var o = d.data(); o.id = d.id; return o; });
    if (isActiveTab('dash')) renderDash(document.getElementById('cnt'));
    if (isActiveTab('hist')) renderHist(document.getElementById('cnt'));
  }, function(e) { console.error('orders listener:', e.message); });

  // Calendar
  db.collection('settings').doc('calendar').onSnapshot(function(snap) {
    if (snap.exists) { S.cal.reqs = snap.data().reqs || []; S.cal.appr = snap.data().appr || []; }
    var el = document.getElementById('creqs'); if (el) el.innerHTML = reqsHTML();
    if (isActiveTab('personal')) drawCal();
  }, function(e) { console.error('calendar listener:', e.message); });

  // App settings (notice)
  db.collection('settings').doc('app').onSnapshot(function(snap) {
    if (snap.exists) Object.assign(S.settings, snap.data());
    if (isActiveTab('dash')) renderDash(document.getElementById('cnt'));
  }, function(e) { console.error('settings listener:', e.message); });

  // Users
  db.collection('users').onSnapshot(function(snap) {
    if (snap.docs.length) S.users = snap.docs.map(function(d) { var o = d.data(); o.id = d.id; return o; });
  }, function(e) { console.error('users listener:', e.message); });

  // Products
  db.collection('products').onSnapshot(function(snap) {
    if (snap.docs.length) S.products = snap.docs.map(function(d) { var o = d.data(); o.id = d.id; return o; });
  }, function(e) { console.error('products listener:', e.message); });

  // Personal (invoices + shifts)
  db.collection('personal').onSnapshot(function(snap) {
    S.personal.invoices = []; S.personal.shifts = [];
    snap.docs.forEach(function(d) {
      var o = d.data(); o.id = d.id;
      if (o.type === 'invoice') S.personal.invoices.push(o);
      if (o.type === 'shift') S.personal.shifts.push(o);
    });
    var il = document.getElementById('inv-list'); if (il) il.innerHTML = invoiceHTML();
    var sl2 = document.getElementById('shift-list'); if (sl2) sl2.innerHTML = shiftHTML();
  }, function(e) { console.error('personal listener:', e.message); });
}

// Load all data once then start listeners
function loadData() {
  if (!FB) return;
  console.log('Loading data from Firebase...');
  var promises = [
    db.collection('shopping').get(),
    db.collection('tasks').get(),
    db.collection('orders').get(),
    db.collection('users').get(),
    db.collection('products').get(),
    db.collection('personal').get(),
    db.collection('settings').doc('app').get(),
    db.collection('settings').doc('calendar').get(),
    db.collection('settings').doc('personal_notes').get()
  ];
  Promise.all(promises).then(function(results) {
    var shop = results[0].docs.map(function(d){var o=d.data();o.id=d.id;return o;});
    var tasks = results[1].docs.map(function(d){var o=d.data();o.id=d.id;return o;});
    var orders = results[2].docs.map(function(d){var o=d.data();o.id=d.id;return o;});
    var users = results[3].docs.map(function(d){var o=d.data();o.id=d.id;return o;});
    var prods = results[4].docs.map(function(d){var o=d.data();o.id=d.id;return o;});
    var personal = results[5].docs.map(function(d){var o=d.data();o.id=d.id;return o;});
    if (shop.length) S.shopping = shop;
    if (tasks.length) S.tasks = tasks;
    if (orders.length) S.orders = orders;
    if (users.length) { S.users = users; }
    else { S.users.forEach(function(u){ save('users', u.id, u); }); }
    if (prods.length) S.products = prods;
    personal.forEach(function(d) {
      if (d.type === 'invoice') S.personal.invoices.push(d);
      if (d.type === 'shift') S.personal.shifts.push(d);
    });
    if (results[6].exists) Object.assign(S.settings, results[6].data());
    if (results[7].exists) { S.cal.reqs = results[7].data().reqs || []; S.cal.appr = results[7].data().appr || []; }
    if (results[8].exists) S.personal.notes = results[8].data().notes || '';
    console.log('Data loaded: shopping=' + S.shopping.length + ' tasks=' + S.tasks.length);
    startListeners();
    // Re-render current tab with fresh data
    var activeTab = document.querySelector('.ntab.on');
    if (activeTab) showTab(activeTab.id.replace('nt-', ''));
  }).catch(function(e) {
    console.error('loadData error:', e.message);
    fbStatus('Erro carregar dados: ' + e.message, false);
    startListeners(); // still try listeners
  });
}

  var el = document.getElementById('nt-' + id);
  return el && el.classList.contains('on');
}

function doLogin() {

  var user = S.users.find(function(x){ return x.username === u && x.pass === p; });

function shopHTML() {

// ═══════════════════════════════════════
function getProds() { return S.products.length ? S.products : AZ_DEFAULT; }
function getCats() { var c=[]; getProds().forEach(function(p){ if(c.indexOf(p.cat)===-1)c.push(p.cat); }); return c; }

function renderAz(c) {
  var ctot = 0; var ccount = 0;
  Object.keys(S.cart).forEach(function(id) {
    var p = getProds().find(function(x){ return x.id===id; });
    if (p) { ctot += p.cost * S.cart[id]; ccount += S.cart[id]; }
  });
  c.innerHTML = '<div class="card">' +
    '<div class="card-title">🧊 Azeitona ' + (ccount>0?'<span class="tag tag-d" style="margin-left:auto">'+ccount+' itens · €'+ctot.toFixed(2)+'</span>':'') + '</div>' +
    '<input type="text" id="azs" placeholder="🔍 Pesquisar produto..." value="' + azSearch + '" style="margin-bottom:12px">' +
    '<div class="filter-row" id="azf">' + buildFilters() + '</div>' +
    '<div id="azprod">' + buildProds() + '</div>' +
    '<div id="azsum">' + buildSum() + '</div></div>';
  document.getElementById('azs').addEventListener('input', function(e){ azSearch=e.target.value; document.getElementById('azprod').innerHTML=buildProds(); });
}

function buildFilters() {
  return ['Todos'].concat(getCats()).map(function(cat) {
    return '<div class="fchip ' + (azFilter===cat?'on':'') + '" onclick="setFilt(\'' + cat + '\')">' + cat + '</div>';
  }).join('');
}
function setFilt(f) { azFilter=f; document.getElementById('azf').innerHTML=buildFilters(); document.getElementById('azprod').innerHTML=buildProds(); }

function buildProds() {
  var prods = getProds();
  if (azFilter !== 'Todos') prods = prods.filter(function(p){ return p.cat===azFilter; });
  if (azSearch) prods = prods.filter(function(p){ return p.name.toLowerCase().indexOf(azSearch.toLowerCase())!==-1 || p.id.indexOf(azSearch)!==-1; });
  if (!prods.length) return '<div class="empty">Nenhum produto encontrado</div>';
  var grouped = {}; prods.forEach(function(p){ if(!grouped[p.cat])grouped[p.cat]=[]; grouped[p.cat].push(p); });
  return Object.keys(grouped).map(function(cat) {
    return '<div class="cat-label">' + cat + '</div><div class="pgrid">' +
      grouped[cat].map(function(p) {
        return '<div class="pcard ' + ((S.cart[p.id]||0)>0?'in-cart':'') + '">' +
          '<div class="pname">' + p.name + '</div>' +
          '<div class="pcod">' + p.id + '</div>' +
          '<div class="pprice">€' + p.cost.toFixed(2) + (p.pvp?' · PVP €'+p.pvp.toFixed(2):'') + '</div>' +
          '<div class="qrow">' +
          '<button class="qbtn" onclick="chgQty(\'' + p.id + '\',-1)">−</button>' +
          '<span class="qnum" id="q-' + p.id + '">' + (S.cart[p.id]||0) + '</span>' +
          '<button class="qbtn" onclick="chgQty(\'' + p.id + '\',1)">+</button>' +
          '</div></div>';
      }).join('') + '</div>';
  }).join('');
}

function chgQty(id, d) {
  var nv = Math.max(0, (S.cart[id]||0) + d);
  if (nv===0) delete S.cart[id]; else S.cart[id]=nv;
  var el=document.getElementById('q-'+id); if(el) el.textContent=nv;
  var pc=el?el.closest('.pcard'):null; if(pc) pc.className='pcard'+(nv>0?' in-cart':'');
  document.getElementById('azsum').innerHTML = buildSum();
  var ctot=0,ccount=0;
  Object.keys(S.cart).forEach(function(id2){var p=getProds().find(function(x){return x.id===id2;});if(p){ctot+=p.cost*S.cart[id2];ccount+=S.cart[id2];}});
  var title=document.querySelector('#cnt .card-title');
  if(title) title.innerHTML='🧊 Azeitona '+(ccount>0?'<span class="tag tag-d" style="margin-left:auto">'+ccount+' itens · €'+ctot.toFixed(2)+'</span>':'');
}

function buildSum() {
  var items=Object.keys(S.cart).filter(function(id){return S.cart[id]>0;});
  if(!items.length) return '';
  var tot=0;
  var lines=items.map(function(id){
    var p=getProds().find(function(x){return x.id===id;});
    if(!p)return'';tot+=p.cost*S.cart[id];
    return '<div class="oline"><span>'+p.name+' ×'+S.cart[id]+'</span><span>€'+(p.cost*S.cart[id]).toFixed(2)+'</span></div>';
  }).join('');
  return '<div class="osum"><h4>📋 Resumo</h4>'+lines+'<div class="oline otot"><span>Total custo</span><span>€'+tot.toFixed(2)+'</span></div>'+
    '<button class="btn btn-g btn-full" style="margin-top:10px" onclick="submitOrder()">📤 Submeter Encomenda</button></div>';
}

function submitOrder() {
  var items=Object.keys(S.cart).filter(function(id){return S.cart[id]>0;}).map(function(id){return [id,S.cart[id]];});
  if(!items.length) return;
  var order={id:'o'+Date.now(),date:new Date().toLocaleDateString('pt-PT'),items:items,by:cu.name};
  S.orders.push(order); S.cart={};
  save('orders',order.id,order);
  alert('✅ Encomenda submetida!');
  showTab('az');
}

// HISTORY
// ═══════════════════════════════════════
function renderHist(c) {
  c.innerHTML = '<div class="card"><div class="card-title">📋 Histórico de Encomendas</div>' +
    (!S.orders.length ? '<div class="empty">Sem encomendas ainda</div>' :
      S.orders.slice().reverse().map(function(o){
        var lines=(o.items||[]).map(function(item){
          var id=Array.isArray(item)?item[0]:item.id;
          var q=Array.isArray(item)?item[1]:item.qty;
          var p=getProds().find(function(x){return x.id===id;});
          return p?p.name+' ×'+q:id;
        }).join(' · ');
        var tot=(o.items||[]).reduce(function(s,item){
          var id=Array.isArray(item)?item[0]:item.id;
          var q=Array.isArray(item)?item[1]:item.qty;
          var p=getProds().find(function(x){return x.id===id;});
          return s+(p?p.cost*q:0);
        },0);
        return '<div class="past-order"><div class="po-hdr"><span class="po-date">'+o.date+'</span><span class="tag tag-d">€'+tot.toFixed(2)+'</span></div>'+
          '<div class="lsub">Por: '+o.by+'</div><div class="po-lines">'+lines+'</div></div>';
      }).join('')) +
    '</div>';
}

function drawCal() {
  var lbl=document.getElementById('cml'); if(lbl) lbl.textContent=calDate.toLocaleDateString('pt-PT',{month:'long',year:'numeric'});
  var con=document.getElementById('cdays'); if(!con) return;
  var y=calDate.getFullYear(),m=calDate.getMonth();
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  var todayStr=new Date().toLocaleDateString('pt-PT');
  con.innerHTML='';
  for(var i=0;i<first;i++){var dd=document.createElement('div');dd.className='cday om';con.appendChild(dd);}
  for(var d=1;d<=days;d++){
    var ds=new Date(y,m,d).toLocaleDateString('pt-PT');
    var isT=ds===todayStr,isR=S.cal.reqs.some(function(r){return r.date===ds&&r.status==='pending';}),isA=S.cal.appr.indexOf(ds)!==-1;
    var el=document.createElement('div');
    el.className='cday'+(isT?' today':isA?' appr':isR?' req':'');
    el.textContent=d; con.appendChild(el);
  }
}
function mvM(d){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+d,1);drawCal();var l=document.getElementById('cml');if(l)l.textContent=calDate.toLocaleDateString('pt-PT',{month:'long',year:'numeric'});}
function reqOff(){
  var d=document.getElementById('fd').value,n=document.getElementById('fn')?document.getElementById('fn').value:'';
  if(!d){alert('Por favor selecione uma data.');return;}
  var ds=new Date(d+'T12:00:00').toLocaleDateString('pt-PT');
  if(S.cal.reqs.some(function(r){return r.date===ds;})){alert('Já existe um pedido para esta data.');return;}
  var req={id:'r'+Date.now(),date:ds,note:n,status:'pending',name:cu.name};
  S.cal.reqs.push(req);
  if(FB) save('settings','calendar',{reqs:S.cal.reqs,appr:S.cal.appr});
  alert('✅ Pedido enviado!');
  document.getElementById('fd').value='';
  if(document.getElementById('fn'))document.getElementById('fn').value='';
  drawCal();
}

      '<div class="irow" style="flex-wrap:wrap;gap:8px;margin-bottom:14px">' +
      '<input type="text" id="inv-month" placeholder="Mês (ex: Março 2026)" style="flex:1;min-width:140px">' +
      '<input type="number" id="inv-amount" placeholder="Valor (€)" style="width:110px">' +
      '<input type="text" id="inv-link" placeholder="Link PDF (Google Drive...)" style="flex:2;min-width:180px">' +
      '<button class="btn btn-g" onclick="addInvoice()">+ Adicionar</button></div>' : '') +
    '<div id="inv-list">' + invoiceHTML() + '</div></div>';

  var shiftHTMLStr = '<div class="card"><div class="card-title">📆 Horário de Trabalho</div>' +
    (cr==='admin' ?
      '<div class="irow" style="flex-wrap:wrap;margin-bottom:12px">' +
      '<select id="sh-day" style="flex:1"><option>Segunda</option><option>Terça</option><option>Quarta</option><option>Quinta</option><option>Sexta</option><option>Sábado</option><option>Domingo</option></select>' +
      '<input type="text" id="sh-start" placeholder="Entrada (ex: 09:00)" style="flex:1">' +
      '<input type="text" id="sh-end" placeholder="Saída (ex: 18:00)" style="flex:1">' +
      '<button class="btn btn-g" onclick="addShift()">+ Adicionar</button></div>' : '') +
    '<div id="shift-list">' + shiftHTML() + '</div></div>';

  var notesHTML = '<div class="card"><div class="card-title">📝 Notas Pessoais</div>' +
    '<textarea id="personal-notes" rows="6" style="resize:vertical;margin-bottom:10px" placeholder="Notas pessoais...">' + (S.personal.notes||'') + '</textarea>' +
    '<button class="btn btn-g" onclick="saveNotes()">💾 Guardar Notas</button></div>';

  c.innerHTML = calHTML + invHTML + shiftHTMLStr + notesHTML;
  drawCal();
}

function invoiceHTML(){
  if(!S.personal.invoices.length) return '<div class="empty">Sem recibos ainda</div>';
  return S.personal.invoices.slice().reverse().map(function(inv){
    var adminBtns = cr==='admin' ?
      '<button class="bic" onclick="toggleInvStatus(\''+inv.id+'\')">'+( inv.status==='paid'?'&#8617;':'&#10003;')+'</button>' +
      '<button class="bic" onclick="delInvoice(\''+inv.id+'\')">&#128465;</button>' : '';
    var pdfLink = inv.link ?
      '<a href="'+inv.link+'" target="_blank" style="font-size:12px;color:var(--g);text-decoration:none;border:1px solid var(--g);padding:4px 10px;border-radius:20px;white-space:nowrap">&#128196; Ver PDF</a>' : '';
    return '<div class="litem"><div style="flex:1"><div class="ltxt">'+inv.month+'</div>' +
      '<div class="lsub">&#8364;'+parseFloat(inv.amount).toFixed(2)+' · '+(inv.status==='paid'?'Pago':'Pendente')+'</div></div>' +
      pdfLink + adminBtns + '</div>';
  }).join('');
}
function addInvoice(){
  var month=document.getElementById('inv-month').value.trim();
  var amount=document.getElementById('inv-amount').value.trim();
  var link=document.getElementById('inv-link').value.trim();
  if(!month||!amount){alert('Preencha o mês e o valor.');return;}
  var inv={id:'i'+Date.now(),month:month,amount:amount,link:link,status:'pending',date:new Date().toLocaleDateString('pt-PT'),type:'invoice'};
  S.personal.invoices.push(inv);
  save('personal','inv_'+inv.id,inv);
  document.getElementById('inv-month').value='';document.getElementById('inv-amount').value='';document.getElementById('inv-link').value='';
  document.getElementById('inv-list').innerHTML=invoiceHTML();
}
function toggleInvStatus(id){
  var inv=S.personal.invoices.find(function(x){return x.id===id;});
  if(inv){inv.status=inv.status==='paid'?'pending':'paid';save('personal','inv_'+id,inv);}
  document.getElementById('inv-list').innerHTML=invoiceHTML();
}
function delInvoice(id){
  S.personal.invoices=S.personal.invoices.filter(function(x){return x.id!==id;});
  remove('personal','inv_'+id);
  document.getElementById('inv-list').innerHTML=invoiceHTML();
}

function shiftHTML(){
  if(!(S.personal.shifts&&S.personal.shifts.length)) return '<div class="empty">Sem horário definido</div>';
  var days=['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
  var sorted=S.personal.shifts.slice().sort(function(a,b){return days.indexOf(a.day)-days.indexOf(b.day);});
  var html2='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">';
  sorted.forEach(function(s){
    var delBtn='';
    if(cr==='admin') delBtn='<button class="bic" onclick="delShift(\'' + s.id + '\')">&#128465;</button>';
    html2+='<div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;position:relative">'+
      '<div style="font-size:12px;font-weight:600;color:var(--rd);margin-bottom:4px">'+s.day+'</div>'+
      '<div style="font-size:13px">'+s.start+' &#8594; '+s.end+'</div>'+
      delBtn+'</div>';
  });
  return html2+'</div>';
}
function addShift(){
  var day=document.getElementById('sh-day').value;
  var start=document.getElementById('sh-start').value.trim();
  var end=document.getElementById('sh-end').value.trim();
  if(!start||!end){alert('Preencha entrada e saída.');return;}
  if(!S.personal.shifts)S.personal.shifts=[];
  var sh={id:'sh'+Date.now(),day:day,start:start,end:end,type:'shift'};
  S.personal.shifts.push(sh);
  save('personal','shift_'+sh.id,sh);
  document.getElementById('sh-start').value='';document.getElementById('sh-end').value='';
  document.getElementById('shift-list').innerHTML=shiftHTML();
}
function delShift(id){
  S.personal.shifts=S.personal.shifts.filter(function(x){return x.id!==id;});
  remove('personal','shift_'+id);
  document.getElementById('shift-list').innerHTML=shiftHTML();
}
function saveNotes(){
  var el=document.getElementById('personal-notes');if(!el)return;
  S.personal.notes=el.value;
  save('settings','personal_notes',{notes:S.personal.notes});
  alert('✅ Notas guardadas!');
}

// ═══════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════
var AZ_CATS=['Bacalhau','Pratos Prontos','Risotos & Lasanhas','Entradas (Pack)','Empadas','Caixa (Avulso)'];

function renderAdmin(c){
  c.innerHTML=
    '<div class="card"><div class="card-title">📢 Aviso para Idalia</div>'+
    '<textarea id="notice-txt" rows="3" style="resize:vertical;margin-bottom:10px">'+(S.settings.notice||'')+'</textarea>'+
    '<div style="display:flex;gap:8px">'+
    '<button class="btn btn-g" style="flex:1" onclick="saveNotice()">💾 Guardar</button>'+
    (S.settings.notice?'<button class="btn btn-out" onclick="clearNotice()">🗑 Remover</button>':'')+
    '</div></div>'+
    '<div class="card"><div class="card-title">👥 Utilizadores</div>'+
    '<div id="users-list">'+usersHTML()+'</div>'+
    '<button class="btn btn-dark" style="margin-top:12px" onclick="openAddUser()">+ Novo utilizador</button></div>'+
    '<div class="card"><div class="card-title">🧊 Produtos Azeitona</div>'+
    '<div style="margin-bottom:10px;display:flex;gap:8px">'+
    '<input type="text" id="prod-search" placeholder="Filtrar produto..." style="flex:1" oninput="document.getElementById(&quot;prod-list&quot;).innerHTML=prodAdminHTML(this.value)">'+
    '<button class="btn btn-dark" onclick="openAddProd()">+ Novo</button></div>'+
    '<div id="prod-list">'+prodAdminHTML('')+'</div></div>'+
    '<div class="card"><div class="card-title">⚙️ Definições</div>'+
    '<div class="setting-row"><label>Nome da loja</label><input type="text" id="set-name" value="'+(S.settings.shopName||'')+'"></div>'+
    '<div class="setting-row"><label>Email do admin</label><input type="email" id="set-email" value="'+(S.settings.ownerEmail||'')+'"></div>'+
    '<button class="btn btn-g" style="margin-top:14px;width:100%" onclick="saveSettings()">💾 Guardar Definições</button></div>';
}

function usersHTML(){
  return S.users.map(function(u){
    var btns = u.username!=='admin' ?
      '<button class="bic" onclick="openEditUser(\''+u.id+'\')">&#9998;</button>'+
      '<button class="bic" onclick="delUser(\''+u.id+'\')">&#128465;</button>' :
      '<span class="tag tag-dark">protegido</span>';
    return '<div class="user-row">'+
      '<div class="user-avatar '+(u.role==='admin'?'ua-admin':'ua-worker')+'">'+u.name[0].toUpperCase()+'</div>'+
      '<div style="flex:1"><div style="font-size:14px;font-weight:500">'+u.name+'</div>'+
      '<div class="lsub">@'+u.username+' · '+u.role+'</div></div>'+
      btns+'</div>';
  }).join('');
}
function prodAdminHTML(filter){
  var prods=(S.products.length?S.products:AZ_DEFAULT).filter(function(p){
    return !filter||p.name.toLowerCase().indexOf(filter.toLowerCase())!==-1||p.id.indexOf(filter)!==-1;
  });
  if(!prods.length) return '<div class="empty">Sem produtos</div>';
  return prods.map(function(p){
    return '<div class="prod-admin-row">'+
      '<div class="pn">'+p.name+'</div>'+
      '<div class="pc">€'+p.cost.toFixed(2)+(p.pvp?' / €'+p.pvp.toFixed(2):'')+'</div>'+
      '<button class="bic" onclick="openEditProd(\''+p.id+'\')">&#9998;</button>'+
      '<button class="bic" onclick="delProd(\''+p.id+'\')">&#128465;</button>'+
      '</div>';
  }).join('');
}

function saveNotice(){var el=document.getElementById('notice-txt');if(!el)return;S.settings.notice=el.value.trim();save('settings','app',S.settings);alert('✅ Aviso guardado!');showTab('admin');}
function clearNotice(){S.settings.notice='';save('settings','app',S.settings);showTab('admin');}
function saveSettings(){var n=document.getElementById('set-name');var e=document.getElementById('set-email');if(n)S.settings.shopName=n.value;if(e)S.settings.ownerEmail=e.value;save('settings','app',S.settings);alert('✅ Definições guardadas!');}

function openAddUser(){openModal('<h3>Novo utilizador</h3><div class="field"><label>Nome</label><input type="text" id="m-name" placeholder="ex: João"></div><div class="field"><label>Utilizador</label><input type="text" id="m-user" placeholder="ex: joao"></div><div class="field"><label>Palavra-passe</label><input type="text" id="m-pass" placeholder="ex: loja2024"></div><div class="field"><label>Tipo</label><select id="m-role"><option value="worker">Colaborador</option><option value="admin">Admin</option></select></div><div class="modal-btns"><button class="btn btn-out" onclick="closeModal()">Cancelar</button><button class="btn btn-g" onclick="saveNewUser()">Criar</button></div>');}
function saveNewUser(){var name=document.getElementById('m-name').value.trim(),username=document.getElementById('m-user').value.trim().toLowerCase(),pass=document.getElementById('m-pass').value.trim(),role=document.getElementById('m-role').value;if(!name||!username||!pass){alert('Preencha todos os campos.');return;}if(S.users.find(function(u){return u.username===username;})){alert('Esse utilizador já existe.');return;}var user={id:'u'+Date.now(),username:username,pass:pass,role:role,name:name};S.users.push(user);save('users',user.id,user);closeModal();showTab('admin');}
function openEditUser(id){
  var u=S.users.find(function(x){return x.id===id;});
  if(!u)return;
  var h='<h3>Editar: '+u.name+'</h3>'+
    '<div class="field"><label>Nome</label><input type="text" id="m-name" value="'+u.name+'"></div>'+
    '<div class="field"><label>Nova palavra-passe</label><input type="text" id="m-pass" value="'+u.pass+'"></div>'+
    '<div class="field"><label>Tipo</label><select id="m-role">'+
    '<option value="worker"'+(u.role==='worker'?' selected':'')+'>Colaborador</option>'+
    '<option value="admin"'+(u.role==='admin'?' selected':'')+'>Admin</option>'+
    '</select></div>'+
    '<div class="modal-btns">'+
    '<button class="btn btn-out" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-g" onclick="saveEditUser(\''+id+'\')">Guardar</button>'+
    '</div>';
  openModal(h);
}
function saveEditUser(id){var u=S.users.find(function(x){return x.id===id;});if(!u)return;u.name=document.getElementById('m-name').value.trim();u.pass=document.getElementById('m-pass').value.trim();u.role=document.getElementById('m-role').value;save('users',id,u);closeModal();showTab('admin');}
function delUser(id){if(!confirm('Apagar este utilizador?'))return;S.users=S.users.filter(function(x){return x.id!==id;});remove('users',id);showTab('admin');}

function openAddProd(){openModal('<h3>Novo produto</h3><div class="field"><label>Código</label><input type="text" id="m-pid" placeholder="ex: 9999"></div><div class="field"><label>Nome</label><input type="text" id="m-pname" placeholder="ex: Lasanha Atum 500g"></div><div class="field"><label>Categoria</label><select id="m-pcat">'+AZ_CATS.map(function(c){return'<option>'+c+'</option>';}).join('')+'</select></div><div class="field"><label>Preço custo (€)</label><input type="number" id="m-pcost" step="0.01" placeholder="0.00"></div><div class="field"><label>PVP (€, opcional)</label><input type="number" id="m-ppvp" step="0.01" placeholder="0.00"></div><div class="modal-btns"><button class="btn btn-out" onclick="closeModal()">Cancelar</button><button class="btn btn-g" onclick="saveNewProd()">Adicionar</button></div>');}
function saveNewProd(){var id=document.getElementById('m-pid').value.trim(),name=document.getElementById('m-pname').value.trim(),cat=document.getElementById('m-pcat').value,cost=parseFloat(document.getElementById('m-pcost').value)||0,pvpVal=document.getElementById('m-ppvp').value,pvp=pvpVal?parseFloat(pvpVal):null;if(!id||!name){alert('Preencha código e nome.');return;}if(!S.products.length)S.products=AZ_DEFAULT.slice();if(S.products.find(function(p){return p.id===id;})){alert('Código já existe.');return;}var prod={id:id,name:name,cat:cat,cost:cost,pvp:pvp};S.products.push(prod);save('products',id,prod);closeModal();showTab('admin');}
function openEditProd(id){
  var p=(S.products.length?S.products:AZ_DEFAULT).find(function(x){return x.id===id;});
  if(!p)return;
  var h='<h3>Editar produto</h3>'+
    '<div class="field"><label>Nome</label><input type="text" id="m-pname" value="'+p.name+'"></div>'+
    '<div class="field"><label>Categoria</label><select id="m-pcat">'+
    AZ_CATS.map(function(c){return'<option'+(p.cat===c?' selected':'')+'>'+c+'</option>';}).join('')+
    '</select></div>'+
    '<div class="field"><label>Preco custo</label><input type="number" id="m-pcost" step="0.01" value="'+p.cost+'"></div>'+
    '<div class="field"><label>PVP</label><input type="number" id="m-ppvp" step="0.01" value="'+(p.pvp||'')+'"></div>'+
    '<div class="modal-btns">'+
    '<button class="btn btn-out" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-g" onclick="saveEditProd(\''+id+'\')">Guardar</button>'+
    '</div>';
  openModal(h);
}
function saveEditProd(id){if(!S.products.length)S.products=AZ_DEFAULT.slice();var p=S.products.find(function(x){return x.id===id;});if(!p)return;p.name=document.getElementById('m-pname').value.trim();p.cat=document.getElementById('m-pcat').value;p.cost=parseFloat(document.getElementById('m-pcost').value)||0;var pv=document.getElementById('m-ppvp').value;p.pvp=pv?parseFloat(pv):null;save('products',id,p);closeModal();showTab('admin');}
function delProd(id){if(!confirm('Apagar este produto?'))return;if(!S.products.length)S.products=AZ_DEFAULT.slice();S.products=S.products.filter(function(x){return x.id!==id;});remove('products',id);showTab('admin');}

function openModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('modal-bg').classList.add('open');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.remove('open');}

initFirebase();
</script>
